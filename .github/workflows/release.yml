name: Android CI/CD

on:
  push:
    branches: ["main", "master"]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./android

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        # Bypassing lint checks which typically fail CI release builds
        run: ./gradlew assembleRelease -x lint --stacktrace

      - name: Rename Release APK
        run: mv app/build/outputs/apk/release/app-release.apk "app/build/outputs/apk/release/share-file.apk"

      - name: Upload Release APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Share-File-Release-APK
          path: android/app/build/outputs/apk/release/share-file.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            android/app/build/outputs/apk/release/share-file.apk
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
