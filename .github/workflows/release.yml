name: Android CI/CD

# Trigger the workflow on pushes to main, or when a version tag (v1.0.0) is pushed, or manually via the Actions tab.
on:
  push:
    branches: ["main", "master"]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

# Opt-in to Node 24 to fix the Node 20 deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Set the default working directory for all 'run' commands to 'android'
    defaults:
      run:
        working-directory: ./android

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK (Unsigned)
        run: ./gradlew assembleRelease

      - name: Upload Debug APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoSleep-Debug-APK
          # Actions (uses) don't respect 'working-directory', so we add the 'android/' prefix here
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoSleep-Release-Unsigned-APK
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk

      # Automatically publish a GitHub Release when a tag (e.g., 'v1.0.0') is pushed
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release-unsigned.apk
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
